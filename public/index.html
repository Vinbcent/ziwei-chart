<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗數排盤</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23ffffff'/%3E%3Ctext x='32' y='44' font-size='36' text-anchor='middle' fill='%238b5e1f' font-family='serif'%3E%E7%B4%AB%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* 現代白介面 */
    --bg: #f4f5f7; --panel: #ffffff; --line: #e4e7eb; --ink: #26282d; --muted: #6b7280; --faint: #9aa1ab;
    --brand: #8b5e1f; --brand-soft: #b8860b;
    /* 命盤（文墨式白底細線盤） */
    --cgrid: #aab1bb; --cink: #1f2937; --csub: #9ca3af; --cmino: #374151; --cadj: #6b7280; --cgod: #9aa1ab;
    --c運: #7c3aed; --c年: #dc2626; --c月: #ea580c; --c日: #16a34a; --c時: #2563eb; --c小: #0891b2;
    --m祿: #16a34a; --m權: #dc2626; --m科: #2563eb; --m忌: #475569;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; color: var(--ink); background: var(--bg); }
  #app { display: grid; grid-template-columns: 296px 1fr; gap: 18px; max-width: 1480px; margin: 0 auto; padding: 18px; }

  /* ── 側欄（現代白卡片） ── */
  aside {
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
    padding: 22px 20px; align-self: start; position: sticky; top: 18px;
    box-shadow: 0 1px 3px rgba(16, 24, 40, .06), 0 8px 24px rgba(16, 24, 40, .04);
  }
  .brand { text-align: center; margin-bottom: 16px; }
  .brand h1 { font-family: "Noto Serif TC", serif; font-weight: 900; font-size: 28px; letter-spacing: 9px; margin: 0; color: var(--brand); text-indent: 9px; }
  .brand p { margin: 5px 0 0; font-size: 11px; letter-spacing: 4px; color: var(--faint); text-indent: 4px; }
  .brand .rule { height: 1px; margin: 14px 26px 0; background: linear-gradient(90deg, transparent, #d8c79a, transparent); }
  fieldset { border: none; margin: 0 0 6px; padding: 0; }
  legend { font-size: 12px; color: var(--brand); letter-spacing: 3px; font-weight: 700; padding: 0; margin-bottom: 8px; }
  .row { display: flex; gap: 8px; margin-bottom: 9px; }
  .row > * { flex: 1; min-width: 0; }
  label.f { display: block; font-size: 11px; color: var(--muted); }
  label.f > span { display: block; margin-bottom: 3px; letter-spacing: 1px; }
  input[type=number], input[type=date], select {
    width: 100%; padding: 7px 9px; font-size: 14px; color: var(--ink);
    background: #fff; border: 1px solid #d6dae0; border-radius: 8px; font-family: inherit; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, select:focus { border-color: var(--brand-soft); box-shadow: 0 0 0 3px rgba(184, 134, 11, .12); }
  select { appearance: none; background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%); background-position: calc(100% - 14px) 55%, calc(100% - 9px) 55%; background-size: 5px 5px; background-repeat: no-repeat; }
  .seg { display: flex; background: #f0f1f3; border-radius: 9px; padding: 3px; }
  .seg input { display: none; }
  .seg label { flex: 1; text-align: center; font-size: 13px; padding: 6px 0; cursor: pointer; color: var(--muted); border-radius: 7px; transition: .15s; }
  .seg input:checked + label { background: #fff; color: var(--ink); font-weight: 700; box-shadow: 0 1px 3px rgba(16, 24, 40, .12); }
  #leap-row { display: none; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); margin: -3px 0 9px; }
  .divider { height: 1px; background: var(--line); margin: 14px 0; }
  #go {
    width: 100%; padding: 12px 0; margin-top: 4px; font-size: 16px; letter-spacing: 12px; text-indent: 12px;
    font-family: "Noto Serif TC", serif; font-weight: 700; color: #fff; cursor: pointer;
    background: linear-gradient(180deg, #c0902c, var(--brand)); border: none; border-radius: 10px;
    box-shadow: 0 4px 14px rgba(139, 94, 31, .3); transition: .15s;
  }
  #go:hover { filter: brightness(1.07); transform: translateY(-1px); }
  #go:disabled { opacity: .55; cursor: wait; transform: none; }
  .pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill { font-size: 12px; padding: 4px 12px; border-radius: 999px; border: 1px solid; color: var(--muted); cursor: pointer; user-select: none; transition: .15s; background: #fff; }
  .pill.on { color: #fff; font-weight: 700; border-color: transparent; }
  #error { margin-top: 12px; font-size: 12px; color: #b91c1c; line-height: 1.5; }
  .side-foot { margin-top: 16px; text-align: center; }
  .side-foot a { font-size: 11px; color: #c2c7cf; text-decoration: none; letter-spacing: 1px; }
  .side-foot a:hover { color: var(--muted); text-decoration: underline; }

  /* ── 主區 ── */
  main { min-width: 0; }
  .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .tab {
    font-family: "Noto Serif TC", serif; font-size: 15px; letter-spacing: 4px; padding: 9px 26px;
    color: var(--muted); background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; cursor: pointer; transition: .15s; box-shadow: 0 1px 2px rgba(16, 24, 40, .04);
  }
  .tab:hover { color: var(--ink); }
  .tab.on { color: var(--brand); border-color: #d8c79a; font-weight: 700; }
  #empty {
    background: var(--panel); border: 1px dashed #d6dae0; border-radius: 16px; padding: 90px 20px;
    text-align: center; color: var(--faint); font-size: 14px; letter-spacing: 3px;
  }
  #empty .big { font-family: "Noto Serif TC", serif; font-size: 22px; color: var(--muted); margin-bottom: 10px; letter-spacing: 6px; }

  /* ── 命盤（文墨式：白底、細線連格、星曜直書） ── */
  #board-wrap { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 14px; box-shadow: 0 1px 3px rgba(16, 24, 40, .05); }
  #grid {
    display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: minmax(208px, auto);
    gap: 1px; background: var(--cgrid); border: 1.5px solid var(--cgrid);
    position: relative;
  }
  #lines { position: absolute; left: 0; top: 0; pointer-events: none; z-index: 6; }
  .palace {
    background: #fff; padding: 5px 5px 4px; position: relative; display: flex; flex-direction: column;
    font-size: 12px; cursor: pointer; transition: box-shadow .15s, background .15s;
  }
  .palace:hover { box-shadow: inset 0 0 0 2px var(--brand-soft); }
  .palace.selected { box-shadow: inset 0 0 0 2px var(--brand); background: #fffdf4; }
  .palace.tri { background: #fdf6e3; }

  /* 直書星曜：一字一行 */
  .vt { display: inline-block; width: 1.15em; word-break: break-all; line-height: 1.12; text-align: center; }
  .starzone { display: flex; flex-wrap: wrap; gap: 0 1px; align-content: flex-start; min-height: 104px; }
  .star { display: inline-flex; flex-direction: column; align-items: center; }
  .star .b { font-size: 9px; color: var(--csub); margin-top: 1px; }
  /* 星曜字體統一大小，僅以字重與顏色區分主星/輔星/雜曜 */
  .star .n { font-size: 13px; }
  .star.t1 .n { font-weight: 700; color: var(--cink); }
  .star.t2 .n { font-weight: 600; color: var(--cmino); }
  .star.t3 .n { color: var(--cadj); }
  .chip { font-size: 9px; line-height: 1.15; width: 1.3em; word-break: break-all; text-align: center; border-radius: 3px; color: #fff; font-weight: 700; margin-top: 1px; padding: 1px 0; }
  .chip.self { background: transparent !important; border-width: 1px; border-style: solid; font-weight: 500; }

  .flow { margin-top: 2px; display: flex; flex-wrap: wrap; gap: 1px 5px; }
  .flow span { font-size: 9.5px; font-weight: 600; line-height: 1.45; }
  .pfoot { margin-top: auto; padding-top: 2px; }
  .overlay-names { display: flex; flex-wrap: wrap; gap: 1px 6px; margin-bottom: 1px; }
  .overlay-names span { font-size: 9.5px; font-weight: 700; line-height: 1.4; }
  .pmain { display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid #e5e7eb; padding-top: 3px; gap: 4px; }
  .gods2 { display: grid; grid-template-columns: auto auto; gap: 0 7px; font-size: 9px; color: var(--cgod); line-height: 1.45; white-space: nowrap; }
  .pcenter { text-align: center; flex: 1; }
  .pname { font-family: "Noto Serif TC", serif; font-size: 14px; font-weight: 700; color: var(--brand); letter-spacing: 1px; }
  .ptag { font-size: 9px; vertical-align: 2px; margin-left: 2px; padding: 0 3px; border-radius: 3px; background: #b45309; color: #fff; letter-spacing: 0; font-family: "Noto Sans TC", sans-serif; font-weight: 400; }
  .ptag.origin { background: #0e7490; }
  .pinfo { font-size: 9px; color: var(--csub); line-height: 1.4; }
  .pgz { font-family: "Noto Serif TC", serif; font-size: 13.5px; color: var(--cink); align-self: flex-end; }
  .marks { position: absolute; top: 4px; right: 5px; display: flex; gap: 2px; }
  .marks span { font-size: 10px; font-weight: 700; color: #fff; border-radius: 3px; padding: 1px 3px; }

  /* 中央資訊 */
  #center { grid-area: 2 / 2 / 4 / 4; background: #fff; padding: 16px 20px; overflow: auto; cursor: default; }
  #center h2 { font-family: "Noto Serif TC", serif; margin: 0 0 2px; font-size: 18px; letter-spacing: 5px; color: var(--brand); }
  #center .pillars { font-family: "Noto Serif TC", serif; font-size: 18px; letter-spacing: 4px; color: var(--cink); margin: 6px 0 2px; }
  #center .meta { font-size: 12.5px; color: var(--muted); line-height: 1.9; }
  #center .meta b { color: var(--cink); font-weight: 700; }
  .keyrow { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .key { font-size: 11.5px; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--line); background: #f8f9fa; color: var(--muted); }
  .key b { color: var(--brand); font-weight: 700; margin-left: 2px; }
  .sihua { display: flex; gap: 8px; margin: 6px 0 2px; flex-wrap: wrap; }
  .sihua span { font-size: 12px; padding: 3px 9px; border-radius: 5px; color: #fff; font-weight: 700; }
  #center .hor { border-top: 1px dashed var(--line); margin-top: 10px; padding-top: 10px; font-size: 12.5px; line-height: 2; color: var(--muted); }
  #center .hor .lay { display: inline-block; min-width: 34px; font-weight: 700; }
  #center .tip { margin-top: 8px; font-size: 10.5px; color: var(--faint); }

  /* ── 文字盤 ── */
  #view-text { display: none; }
  .text-bar { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
  .text-bar button { font-size: 13px; padding: 7px 18px; border-radius: 8px; border: 1px solid var(--line); background: var(--panel); color: var(--ink); cursor: pointer; letter-spacing: 2px; transition: .15s; }
  .text-bar button:hover { border-color: var(--brand-soft); color: var(--brand); }
  .text-bar .hint { font-size: 11.5px; color: var(--faint); }
  #text-pane {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 18px 20px; font-family: Consolas, "Noto Sans TC", monospace; font-size: 12.5px;
    line-height: 1.75; color: #374151; white-space: pre-wrap; word-break: break-all; min-height: 300px;
    box-shadow: 0 1px 3px rgba(16, 24, 40, .05);
  }

  @media (max-width: 1080px) {
    #app { grid-template-columns: 1fr; }
    aside { position: static; }
    #grid { grid-template-columns: repeat(2, 1fr); }
    .palace { grid-area: auto !important; }
    #center { grid-area: auto; order: 99; }
  }
</style>
</head>
<body>
<div id="app">
  <aside>
    <div class="brand">
      <h1>紫微斗數</h1>
      <p>本命 × 運限 × 流曜 排盤</p>
      <div class="rule"></div>
    </div>

    <fieldset>
      <legend>出生資料</legend>
      <div class="row">
        <div class="seg" id="seg-cal">
          <input type="radio" name="cal" id="cal-solar" value="solar" checked><label for="cal-solar">國曆</label>
          <input type="radio" name="cal" id="cal-lunar" value="lunar"><label for="cal-lunar">農曆</label>
        </div>
      </div>
      <div class="row">
        <label class="f"><span>年</span><input type="number" id="year" value="2000" min="1901" max="2099"></label>
        <label class="f"><span>月</span><input type="number" id="month" value="8" min="1" max="12"></label>
        <label class="f"><span>日</span><input type="number" id="day" value="16" min="1" max="31"></label>
      </div>
      <div id="leap-row"><input type="checkbox" id="isLeapMonth"><label for="isLeapMonth">此月為閏月</label></div>
      <div class="row">
        <label class="f"><span>時辰</span><select id="timeIndex"></select></label>
      </div>
      <div class="row">
        <div class="seg">
          <input type="radio" name="g" id="g-f" value="female" checked><label for="g-f">女</label>
          <input type="radio" name="g" id="g-m" value="male"><label for="g-m">男</label>
        </div>
      </div>
    </fieldset>

    <div class="divider"></div>

    <fieldset>
      <legend>運限目標</legend>
      <div class="row">
        <label class="f"><span>日期</span><input type="date" id="targetDate"></label>
      </div>
      <div class="row">
        <label class="f"><span>時辰</span><select id="targetTimeIndex"></select></label>
      </div>
    </fieldset>

    <div class="divider"></div>

    <fieldset>
      <legend>疊盤顯示</legend>
      <div class="pills" id="layer-pills"></div>
    </fieldset>

    <button id="go">排盤</button>
    <div id="error"></div>
    <div class="side-foot"><a href="/api.html">API 文件</a></div>
  </aside>

  <main>
    <div class="tabs">
      <button class="tab on" data-view="chart">命盤</button>
      <button class="tab" data-view="text">文字盤（LLM 用）</button>
    </div>

    <section id="view-chart">
      <div id="empty"><div class="big">未　排　盤</div>輸入出生資料後按「排盤」</div>
      <div id="board-wrap" style="display:none"><div id="grid"></div></div>
    </section>

    <section id="view-text">
      <div class="text-bar">
        <button id="copy-text">複製全文</button>
        <button id="open-api">開啟 API 連結</button>
        <span class="hint">此純文字命盤可直接貼給任何 LLM 進行解盤，亦可由 <code>/api/v1/text</code> 取得</span>
      </div>
      <pre id="text-pane">（尚未排盤）</pre>
    </section>
  </main>
</div>

<script>
'use strict';
/* ── 常數 ── */
const 時辰選項 = ['早子 00–01', '丑 01–03', '寅 03–05', '卯 05–07', '辰 07–09', '巳 09–11',
  '午 11–13', '未 13–15', '申 15–17', '酉 17–19', '戌 19–21', '亥 21–23', '晚子 23–00'];
const 格位 = [[4,1],[3,1],[2,1],[1,1],[1,2],[1,3],[1,4],[2,4],[3,4],[4,4],[4,3],[4,2]]; // 宮位(寅=0)→格線
const 層定義 = [
  { 鍵: '運', 名: '大限', css: 'var(--c運)', 預設: true },
  { 鍵: '年', 名: '流年', css: 'var(--c年)', 預設: true },
  { 鍵: '月', 名: '流月', css: 'var(--c月)', 預設: false },
  { 鍵: '日', 名: '流日', css: 'var(--c日)', 預設: false },
  { 鍵: '時', 名: '流時', css: 'var(--c時)', 預設: false },
];
const 化色 = { 祿: 'var(--m祿)', 權: 'var(--m權)', 科: 'var(--m科)', 忌: 'var(--m忌)' };
let 資料 = null, 文字 = '', 選取 = -1;

/* ── 初始化控制項 ── */
for (const id of ['timeIndex', 'targetTimeIndex']) {
  const sel = document.getElementById(id);
  時辰選項.forEach((t, i) => sel.add(new Option(t + '時', i)));
}
document.getElementById('timeIndex').value = 2;
document.getElementById('targetDate').valueAsDate = new Date();
document.querySelectorAll('input[name=cal]').forEach((r) => r.addEventListener('change', () => {
  document.getElementById('leap-row').style.display = document.getElementById('cal-lunar').checked ? 'flex' : 'none';
}));
const pills = document.getElementById('layer-pills');
for (const 層 of 層定義) {
  const el = document.createElement('span');
  el.className = 'pill' + (層.預設 ? ' on' : '');
  el.textContent = 層.名;
  el.dataset.k = 層.鍵;
  el.style.borderColor = 層.css;
  if (層.預設) el.style.background = 層.css;
  el.addEventListener('click', () => {
    const on = el.classList.toggle('on');
    el.style.background = on ? 層.css : '#fff';
    if (資料) { 繪盤(); 更新文字(); }
  });
  pills.appendChild(el);
}

/** 文字盤輸出維度（跟隨疊盤顯示選擇） */
const 層英文 = { 運: 'decadal', 年: 'yearly', 月: 'monthly', 日: 'daily', 時: 'hourly' };
function 層參數() {
  const on = 啟用層();
  const keys = 層定義.filter((層) => on[層.鍵]).map((層) => 層英文[層.鍵]);
  return keys.length ? keys.join(',') : 'none';
}

/** 依目前疊盤選擇重新取得文字盤 */
async function 更新文字() {
  try {
    文字 = await fetch('/api/v1/text?' + 參數() + '&layers=' + 層參數()).then((r) => r.text());
    document.getElementById('text-pane').textContent = 文字;
  } catch (e) { /* 文字盤更新失敗不阻斷命盤 */ }
}

/* ── 取數 ── */
function 參數() {
  return new URLSearchParams({
    calendar: document.getElementById('cal-lunar').checked ? 'lunar' : 'solar',
    year: document.getElementById('year').value,
    month: document.getElementById('month').value,
    day: document.getElementById('day').value,
    isLeapMonth: document.getElementById('isLeapMonth').checked,
    timeIndex: document.getElementById('timeIndex').value,
    gender: document.getElementById('g-m').checked ? 'male' : 'female',
    targetDate: document.getElementById('targetDate').value,
    targetTimeIndex: document.getElementById('targetTimeIndex').value,
  });
}

async function 排盤() {
  const btn = document.getElementById('go');
  btn.disabled = true; btn.textContent = '推算中…';
  document.getElementById('error').textContent = '';
  try {
    const q = 參數();
    const [盤回, 文回] = await Promise.all([
      fetch('/api/v1/horoscope?' + q).then((r) => r.json()),
      fetch('/api/v1/text?' + q + '&layers=' + 層參數()).then((r) => r.text()),
    ]);
    if (!盤回.success) throw new Error(盤回.error || '未知錯誤');
    資料 = 盤回.data;
    文字 = 文回;
    document.getElementById('empty').style.display = 'none';
    document.getElementById('board-wrap').style.display = '';
    document.getElementById('text-pane').textContent = 文字;
    繪盤();
  } catch (e) {
    document.getElementById('error').textContent = '排盤失敗：' + e.message;
  } finally {
    btn.disabled = false; btn.textContent = '排盤';
  }
}

/* ── 渲染 ── */
function 星HTML(s, 階) {
  const chips = [];
  if (s.四化) chips.push(`<span class="chip" style="background:${化色[s.四化]}">${s.四化}</span>`);
  if (s.離心自化) chips.push(`<span class="chip self" style="border-color:${化色[s.離心自化]};color:${化色[s.離心自化]}">↓${s.離心自化}</span>`);
  if (s.向心自化) chips.push(`<span class="chip self" style="border-color:${化色[s.向心自化]};color:${化色[s.向心自化]}">↑${s.向心自化}</span>`);
  return `<span class="star ${階}"><span class="n vt">${s.名稱}</span>${s.亮度 ? `<span class="b">${s.亮度}</span>` : ''}${chips.join('')}</span>`;
}

function 啟用層() {
  const on = {};
  document.querySelectorAll('#layer-pills .pill').forEach((el) => { on[el.dataset.k] = el.classList.contains('on'); });
  return on;
}

function 繪盤() {
  const { 本命, 運限 } = 資料;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const on = 啟用層();
  const 層資料 = { 運: 運限.大限, 年: 運限.流年, 月: 運限.流月, 日: 運限.流日, 時: 運限.流時 };

  for (let i = 0; i < 12; i++) {
    const p = 本命.宮位[i];
    const div = document.createElement('div');
    div.className = 'palace';
    div.style.gridArea = `${格位[i][0]} / ${格位[i][1]}`;
    div.dataset.idx = i;

    let 標 = '';
    for (const 層 of 層定義) {
      if (on[層.鍵] && 層資料[層.鍵].宮位索引 === i) 標 += `<span style="background:${層.css}">${層.鍵 === '運' ? '限' : 層.鍵}</span>`;
    }
    if (運限.小限.宮位索引 === i) 標 += `<span style="background:var(--c小)">小</span>`;

    let 流曜 = '';
    for (const 層 of 層定義) {
      if (!on[層.鍵] || !層資料[層.鍵].流曜) continue;
      for (const 名 of 層資料[層.鍵].流曜[i] || []) {
        流曜 += `<span style="color:${層.css}">${名}</span>`;
      }
    }

    let 疊名 = '';
    for (const 層 of 層定義) {
      if (on[層.鍵]) 疊名 += `<span style="color:${層.css}">${層.鍵 === '運' ? '限' : 層.鍵}${層資料[層.鍵].宮名[i]}</span>`;
    }

    const 星區 = [
      ...p.主星.map((s) => 星HTML(s, 't1')),
      ...p.輔星.map((s) => 星HTML(s, 't2')),
      ...p.雜曜.map((s) => 星HTML(s, 't3')),
    ].join('');

    div.innerHTML = `
      <div class="marks">${標}</div>
      <div class="starzone">${星區}</div>
      ${流曜 ? `<div class="flow">${流曜}</div>` : ''}
      <div class="pfoot">
        ${疊名 ? `<div class="overlay-names">${疊名}</div>` : ''}
        <div class="pmain">
          <div class="gods2"><span>${p.長生十二神}</span><span>${p.博士十二神}</span><span>${p.將前十二神}</span><span>${p.歲前十二神}</span></div>
          <div class="pcenter">
            <span class="pname">${p.宮名}${p.是身宮 ? '<span class="ptag">身</span>' : ''}${p.是來因宮 ? '<span class="ptag origin">來因</span>' : ''}</span>
            <div class="pinfo">大限 ${p.大限.起}–${p.大限.迄}　小限 ${p.小限歲數.slice(0, 3).join('.')}…</div>
          </div>
          <span class="pgz vt">${p.天干}${p.地支}</span>
        </div>
      </div>`;
    div.addEventListener('click', () => 選宮(i));
    grid.appendChild(div);
  }

  const 化章 = (四化) => ['祿', '權', '科', '忌'].map((k) => `<span style="background:${化色[k]}">${四化[k]} 化${k}</span>`).join('');
  const c = document.createElement('div');
  c.id = 'center';
  c.innerHTML = `
    <h2>命盤總覽</h2>
    <div class="pillars">${本命.四柱}</div>
    <div class="meta">
      <b>${本命.性別}命</b>　國曆 ${本命.國曆}　${本命.時辰}（${本命.時段}）<br>
      農曆 ${本命.農曆}　生肖<b>${本命.生肖}</b>　${本命.星座}
    </div>
    <div class="keyrow">
      <span class="key">五行局<b>${本命.五行局}</b></span>
      <span class="key">命主<b>${本命.命主}</b></span>
      <span class="key">身主<b>${本命.身主}</b></span>
      <span class="key">子年斗君<b>${本命.子年斗君}</b></span>
    </div>
    <div class="sihua">${化章(本命.生年四化)}</div>
    <div class="hor">
      <span class="lay" style="color:var(--c運)">${運限.大限.名稱}</span>${運限.大限.起}–${運限.大限.迄} 歲（${運限.大限.天干}${運限.大限.地支}）　${['祿','權','科','忌'].map((k) => 運限.大限.四化[k] + k).join('・')}<br>
      <span class="lay" style="color:var(--c年)">流年</span>${運限.流年.天干}${運限.流年.地支}（虛歲 ${運限.虛歲}）　${['祿','權','科','忌'].map((k) => 運限.流年.四化[k] + k).join('・')}<br>
      <span class="lay" style="color:var(--c小)">小限</span>在${運限.小限.地支}宮
      <span class="lay" style="color:var(--c月)">流月</span>${運限.流月.天干}${運限.流月.地支}
      <span class="lay" style="color:var(--c日)">流日</span>${運限.流日.天干}${運限.流日.地支}
      <span class="lay" style="color:var(--c時)">流時</span>${運限.流時.天干}${運限.流時.地支}
      <div class="tip">目標 ${運限.目標國曆}（${運限.目標農曆}）　·　點擊宮位可標示三方四正　·　星曜下方箭頭為自化（↓離心 ↑向心）</div>
    </div>`;
  grid.appendChild(c);

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.id = 'lines';
  grid.appendChild(svg);

  if (選取 >= 0) 標示(選取);
}

function 選宮(i) {
  選取 = 選取 === i ? -1 : i;
  document.querySelectorAll('.palace').forEach((el) => el.classList.remove('selected', 'tri'));
  if (選取 >= 0) 標示(選取);
  else 清線();
}
function 標示(i) {
  document.querySelectorAll('.palace').forEach((el) => {
    const idx = Number(el.dataset.idx);
    if (idx === i) el.classList.add('selected');
    else if ([(i + 4) % 12, (i + 6) % 12, (i + 8) % 12].includes(idx)) el.classList.add('tri');
  });
  畫線(i);
}
function 清線() {
  const svg = document.getElementById('lines');
  if (svg) svg.innerHTML = '';
}
/** 三方四正指示線：三合宮連成三角形，對宮以直線相連 */
function 畫線(i) {
  const svg = document.getElementById('lines');
  const grid = document.getElementById('grid');
  if (!svg || !grid) return;
  svg.setAttribute('width', grid.clientWidth);
  svg.setAttribute('height', grid.clientHeight);
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  const 中心 = (idx) => {
    const el = grid.querySelector(`.palace[data-idx="${idx}"]`);
    return [el.offsetLeft + el.offsetWidth / 2, el.offsetTop + el.offsetHeight / 2];
  };
  const A = 中心(i), B = 中心((i + 4) % 12), C = 中心((i + 8) % 12), D = 中心((i + 6) % 12);
  const 色 = '#9ca3af'; // 灰色虛線
  // 對宮直線
  const ln = document.createElementNS(ns, 'line');
  ln.setAttribute('x1', A[0]); ln.setAttribute('y1', A[1]);
  ln.setAttribute('x2', D[0]); ln.setAttribute('y2', D[1]);
  ln.setAttribute('stroke', 色); ln.setAttribute('stroke-width', '1.5');
  ln.setAttribute('stroke-dasharray', '6 4'); ln.setAttribute('opacity', '.85');
  svg.appendChild(ln);
  // 三合三角形
  const tri = document.createElementNS(ns, 'polygon');
  tri.setAttribute('points', `${A[0]},${A[1]} ${B[0]},${B[1]} ${C[0]},${C[1]}`);
  tri.setAttribute('fill', 'none');
  tri.setAttribute('stroke', 色); tri.setAttribute('stroke-width', '1.5');
  tri.setAttribute('stroke-dasharray', '6 4'); tri.setAttribute('opacity', '.85');
  svg.appendChild(tri);
  // 端點
  for (const [x, y] of [A, B, C, D]) {
    const dot = document.createElementNS(ns, 'circle');
    dot.setAttribute('cx', x); dot.setAttribute('cy', y); dot.setAttribute('r', '3');
    dot.setAttribute('fill', 色); dot.setAttribute('opacity', '.85');
    svg.appendChild(dot);
  }
}
window.addEventListener('resize', () => { if (選取 >= 0 && 資料) 畫線(選取); });

/* ── 分頁與文字盤 ── */
document.querySelectorAll('.tab').forEach((t) => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach((x) => x.classList.remove('on'));
  t.classList.add('on');
  document.getElementById('view-chart').style.display = t.dataset.view === 'chart' ? '' : 'none';
  document.getElementById('view-text').style.display = t.dataset.view === 'text' ? 'block' : 'none';
}));
document.getElementById('copy-text').addEventListener('click', async () => {
  if (!文字) return;
  await navigator.clipboard.writeText(文字);
  const b = document.getElementById('copy-text');
  b.textContent = '已複製 ✓';
  setTimeout(() => { b.textContent = '複製全文'; }, 1500);
});
document.getElementById('open-api').addEventListener('click', () => {
  window.open('/api/v1/text?' + 參數() + '&layers=' + 層參數(), '_blank');
});

document.getElementById('go').addEventListener('click', 排盤);
for (const id of ['targetDate', 'targetTimeIndex']) {
  document.getElementById(id).addEventListener('change', () => { if (資料) 排盤(); });
}
</script>
</body>
</html>
